{% extends "base.html" %} {% block content %}
<div class="blog-index">
    <h1>Blog</h1>

    <ul class="blog-list">
        {% for post in posts %}
        <li class="blog-item">
            <a href="{{ post.url }}" class="blog-title"
                >{{ post.meta.title }}</a
            >
            <div class="blog-date">{{ post.meta.date }}</div>
        </li>
        {% endfor %}
    </ul>
</div>

<style>
    .blog-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .blog-item {
        margin-bottom: 1rem;
        display: block;
    }

    .blog-title {
        display: block;
        font-size: 1.4rem;
        font-weight: 600;
        color: var(--color-link);
        text-decoration: none;
        line-height: 1.3;
        margin-bottom: 0.2rem;
    }

    .blog-title:hover {
        text-decoration: none;
    }

    .blog-date {
        font-size: 0.95rem;
        color: var(--ctp-subtext0);
        font-family: var(--font-main);
    }
</style>
{% endblock %}
